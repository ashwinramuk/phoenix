name: API CI

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "api/**"

defaults:
  run:
    working-directory: api

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
          POSTGRES_DB: phoenix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://phoenix:phoenix@localhost:5432/phoenix
      JWT_SECRET: ci-test-secret-not-for-production
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Provide .env for tooling
        run: cp .env.example .env

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Security scan (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Migrate + seed database
        run: npm run db:migrate && npm run db:seed

      - name: Run tests (unit + integration)
        run: npm test
