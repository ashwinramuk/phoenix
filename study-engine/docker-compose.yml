services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix_study
    ports:
      - "5433:5432" # 5433 on host to avoid clashing with the api's postgres (5432)
    volumes:
      - studydata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5

  study-engine:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://phoenix:phoenix@postgres:5432/phoenix_study
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    # TypeORM `synchronize` creates the schema on boot; seed, then start.
    command: sh -c "node dist/seed/seed.js && node dist/main.js"

volumes:
  studydata:
