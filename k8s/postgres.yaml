# PostgreSQL as a StatefulSet — the idiomatic choice for stateful workloads:
# stable network id + a per-replica PersistentVolume via volumeClaimTemplates.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: phoenix
type: Opaque
stringData:
  POSTGRES_USER: phoenix
  # Demo value — in a real cluster source this from a sealed-secret / external
  # secrets operator (Vault, AWS Secrets Manager), never commit the real one.
  POSTGRES_PASSWORD: phoenix
  POSTGRES_DB: phoenix
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: phoenix
spec:
  clusterIP: None # headless — required for a StatefulSet's stable DNS
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: phoenix
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
