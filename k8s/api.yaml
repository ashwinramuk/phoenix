# Phoenix API (Node/Express). Non-secret config in a ConfigMap, secrets in a
# Secret, schema applied by an initContainer, health-gated by probes on /health,
# and horizontally autoscaled on CPU.
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: phoenix
data:
  NODE_ENV: production
  PORT: "4000"
  CORS_ORIGINS: http://phoenix.local
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: phoenix
type: Opaque
stringData:
  # DATABASE_URL points at the postgres StatefulSet's headless service.
  DATABASE_URL: postgresql://phoenix:phoenix@postgres:5432/phoenix
  JWT_SECRET: change-me-to-a-long-random-string-in-real-clusters
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: phoenix
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # Run migrations to completion before any app container starts.
      initContainers:
        - name: migrate
          image: phoenix-api:latest
          command: ["node", "dist/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
      containers:
        - name: api
          image: phoenix-api:latest
          command: ["node", "dist/server.js"]
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: phoenix
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: phoenix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
